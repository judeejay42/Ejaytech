<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrator Gateway - EJaytech Concepts</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom Corporate Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --admin-dark-bg: #0f172a;
      --admin-slate-accent: #334155;
      --admin-gold: #fbbf24;
      --admin-gold-hover: #f59e0b;
      --font-sans: "Inter", sans-serif;
    }
    body {
      background: radial-gradient(circle at center, #1e293b 0%, #090d16 100%);
      font-family: var(--font-sans);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .admin-card {
      background-color: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }
    .admin-card-header {
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%);
      padding: 40px 32px 24px 32px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .admin-icon-container {
      font-size: 2.25rem;
      background: rgba(251, 191, 36, 0.1);
      color: var(--admin-gold);
      width: 64px;
      height: 64px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .form-control-admin {
      background-color: rgba(15, 23, 42, 0.6) !important;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff !important;
      border-radius: 10px;
      padding: 12px 14px;
      transition: all 0.2s ease;
    }
    .form-control-admin:focus {
      border-color: var(--admin-gold);
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
    }
    .btn-admin {
      background: linear-gradient(135deg, var(--admin-gold) 0%, var(--admin-gold-hover) 100%);
      border: none;
      color: #000000;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      transition: all 0.2s ease-in-out;
    }
    .btn-admin:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.25);
    }
    .btn-admin:active {
      transform: translateY(0);
    }
    .back-to-site {
      color: #94a3b8;
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .back-to-site:hover {
      color: #f8fafc;
    }
  </style>
</head>
<body>

  <div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-icon-container">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h3 class="fw-bold mb-1">Administrative Terminal</h3>
      <p class="text-muted small mb-0">Authorized personnel only. Sessions are audited.</p>
    </div>

    <div class="p-4 p-md-5">
      <!-- Alerts -->
      <div class="alert alert-danger d-none" id="admin-error-alert" role="alert" style="background-color: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.2); color: #fca5a5; font-size: 0.875rem;">
        <i class="bi bi-exclamation-octagon-fill me-2"></i> <span id="admin-err-msg">Access Denied.</span>
      </div>

      <form id="admin-login-form">
        <div class="mb-3">
          <label for="admin-email" class="form-label text-muted small fw-semibold text-uppercase" style="letter-spacing: 0.5px;">Security Email</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-0 text-muted ps-0"><i class="bi bi-person-fill"></i></span>
            <input type="email" class="form-control form-control-admin" id="admin-email" required placeholder="admin@ejaytech.com">
          </div>
        </div>

        <div class="mb-4">
          <label for="admin-password" class="form-label text-muted small fw-semibold text-uppercase" style="letter-spacing: 0.5px;">Security Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-0 text-muted ps-0"><i class="bi bi-key-fill"></i></span>
            <input type="password" class="form-control form-control-admin" id="admin-password" required placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn btn-admin w-100 mb-3" id="admin-submit-btn">
          <i class="bi bi-unlock-fill me-2"></i> Authenticate Console
        </button>
      </form>
    </div>
  </div>

  <div class="mt-4 text-center">
    <a href="student.html" class="back-to-site"><i class="bi bi-arrow-left me-1"></i> Return to Student Portal</a>
  </div>

  <!-- App Custom Logic Modules -->
  <script type="module" src="/firebase-config.js"></script>

  <!-- Form Controllers & Routing Logic -->
  <script type="module">
    // Admin authentication logic removed. Ready for a new authentication system.
    document.getElementById("admin-login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      console.log("Admin login form submitted. Authentication system is currently being re-engineered.");
    });
  </script>
</body>
</html>
