<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abuja Centre - Instructor Login - EJaytech Concepts</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
        <img src="/assets/images/logo-512.png" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
        <span class="font-display" style="letter-spacing: 0.03em;">EJaytech Concepts</span>
      </a>
    </div>
  </nav>

  <!-- Login Container -->
  <section class="py-5 bg-light" id="admin-gateway">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="card p-4 p-md-5 bg-white shadow-lg rounded-4 text-center border-0">
            
            <!-- Branding and Logo -->
            <div class="mb-4">
              <div class="d-flex align-items-center justify-content-center mb-3">
                <img src="/assets/images/logo-512.png" alt="Logo" style="width: 72px; height: 72px; object-fit: contain;">
              </div>
              <h4 class="fw-bold text-dark font-display mb-1">Abuja Instructor Portal</h4>
              <span class="badge bg-info text-dark border border-info fw-semibold mb-3 px-3 py-1 text-uppercase" style="font-size: 0.72rem; letter-spacing: 0.05em;">Instructor Login</span>
              <p class="text-muted small">Please authenticate with your Abuja Instructor credentials.</p>
            </div>

            <!-- Alerts -->
            <div class="alert alert-danger d-none" id="error-alert">
              <span id="error-msg">Invalid credentials.</span>
            </div>
            <div class="alert alert-success d-none" id="success-alert">
              <span>Authentication Approved! Redirecting to Instructor Dashboard...</span>
            </div>

            <!-- Login Form -->
            <form id="instructor-login-form" class="text-start">
              <div class="mb-3">
                <label for="inst-email" class="form-label font-display fw-semibold text-dark small">Instructor Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0"><i class="bi bi-person-badge text-muted"></i></span>
                  <input type="email" class="form-control border-start-0" id="inst-email" placeholder="instructor.abuja@ejaytech.com" required>
                </div>
              </div>
              
              <div class="mb-3">
                <label for="inst-password" class="form-label font-display fw-semibold text-dark small">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input type="password" class="form-control border-start-0 border-end-0" id="inst-password" placeholder="••••••••" required>
                  <button type="button" class="btn btn-outline-secondary border-start-0 bg-white" id="btn-toggle-password" style="border-color: #dee2e6;">
                    <i class="bi bi-eye text-muted" id="icon-toggle-password"></i>
                  </button>
                </div>
              </div>

              <!-- Submit Button -->
              <button type="submit" class="btn btn-info w-100 font-display py-2 fw-semibold text-dark" id="submit-btn" style="border-radius: 8px;">
                <i class="bi bi-shield-lock-fill me-2"></i> Authenticate Instructor Portal
              </button>

              <div class="text-center mt-3">
                <a href="admin.html" class="text-decoration-none small text-primary fw-medium"><i class="bi bi-arrow-left"></i> Back to Admin Hub</a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script type="module">
    import { seedAdminMockDatabase } from "./admin.js";

    // Initialize Mock DB
    seedAdminMockDatabase();

    const loginForm = document.getElementById("instructor-login-form");
    const errorAlert = document.getElementById("error-alert");
    const errorAlertMsg = document.getElementById("error-msg");
    const successAlert = document.getElementById("success-alert");
    const submitBtn = document.getElementById("submit-btn");
    const passwordInput = document.getElementById("inst-password");
    const togglePasswordBtn = document.getElementById("btn-toggle-password");
    const togglePasswordIcon = document.getElementById("icon-toggle-password");

    togglePasswordBtn.addEventListener("click", () => {
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        togglePasswordIcon.classList.remove("bi-eye");
        togglePasswordIcon.classList.add("bi-eye-slash");
      } else {
        passwordInput.type = "password";
        togglePasswordIcon.classList.remove("bi-eye-slash");
        togglePasswordIcon.classList.add("bi-eye");
      }
    });

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("inst-email").value.trim();
      const password = passwordInput.value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';
      successAlert.classList.add("d-none");
      errorAlert.classList.add("d-none");

      setTimeout(() => {
        try {
          if (email !== "instructor.abuja@ejaytech.com" || password !== "instructor123") {
            // Check if there are dynamically created instructor accounts too!
            const customInstructors = JSON.parse(localStorage.getItem("mock_instructors") || "[]");
            const matched = customInstructors.find(inst => inst.email === email && inst.password === password && inst.centreId === "abuja");
            if (!matched) {
              throw new Error("Access Denied: Invalid credentials for Abuja Instructor.");
            }
            
            sessionStorage.setItem("instructor_logged_in", "true");
            sessionStorage.setItem("instructor_centre_id", "abuja");
            sessionStorage.setItem("instructor_centre_name", "Abuja Centre");
            sessionStorage.setItem("instructor_email", matched.email);
            sessionStorage.setItem("instructor_name", matched.name);
          } else {
            sessionStorage.setItem("instructor_logged_in", "true");
            sessionStorage.setItem("instructor_centre_id", "abuja");
            sessionStorage.setItem("instructor_centre_name", "Abuja Centre");
            sessionStorage.setItem("instructor_email", "instructor.abuja@ejaytech.com");
            sessionStorage.setItem("instructor_name", "Engr. Kayode");
          }

          successAlert.classList.remove("d-none");
          setTimeout(() => {
            window.location.href = "instructor-dashboard.html";
          }, 1500);

        } catch (err) {
          errorAlertMsg.textContent = err.message;
          errorAlert.classList.remove("d-none");
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="bi bi-shield-lock-fill me-2"></i> Authenticate Instructor Portal';
        }
      }, 800);
    });
  </script>
</body>
</html>
