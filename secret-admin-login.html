<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrative Portal - EJaytech Concepts</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom Fonts -->
  <link href="https://fonts.googleapis.com/css2 family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-slate-950: #030712;
      --color-slate-900: #0f172a;
      --color-slate-800: #1e293b;
      --color-slate-700: #334155;
      --color-primary: #3b82f6;
      --color-brand-secondary: #10b981;
      --font-sans: "Inter", sans-serif;
      --font-display: "Space Grotesk", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1e293b 0%, #030712 100%);
      font-family: var(--font-sans);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .gateway-card {
      background-color: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gateway-header {
      background: linear-gradient(180deg, rgba(30, 58, 138, 0.4) 0%, rgba(15, 23, 42, 0) 100%);
      padding: 40px 32px 24px 32px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .gateway-icon {
      font-size: 2.25rem;
      background: rgba(59, 130, 246, 0.15);
      color: var(--color-primary);
      width: 72px;
      height: 72px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .form-control-custom {
      background-color: rgba(3, 7, 18, 0.6) !important;
      border: 1px solid var(--color-slate-700);
      color: #f8fafc !important;
      border-radius: 12px;
      padding: 14px 16px;
      transition: all 0.2s ease;
    }

    .form-control-custom:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }

    .btn-custom-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none;
      color: #ffffff;
      font-weight: 600;
      padding: 14px;
      border-radius: 12px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .btn-custom-primary:hover {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      transform: translateY(-1.5px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
    }

    .btn-custom-primary:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="gateway-card">
    <div class="gateway-header">
      <div class="gateway-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h3 class="fw-bold font-display text-white mb-2" id="login-title">Administrative Gateway</h3>
      <p class="text-white-50 mb-0 small">EJaytech Concepts Operations Command</p>
    </div>

    <div class="p-4">
      <!-- Success Alert -->
      <div class="alert alert-success d-none py-2.5 px-3 small rounded-3 border-0 bg-success bg-opacity-10 text-success mb-4" id="login-success-alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span id="login-success-msg">Authentication verified. Loading workspace...</span>
      </div>
      <!-- Error Alert -->
      <div class="alert alert-danger d-none py-2.5 px-3 small rounded-3 border-0 bg-danger bg-opacity-10 text-danger mb-4" id="login-error-alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="login-err-msg">Access denied. Invalid credentials.</span>
      </div>

      <form id="admin-login-form" class="d-grid gap-3">
        <div>
          <label class="form-label text-white-50 small mb-1.5 fw-medium">Admin Username</label>
          <input type="text" class="form-control form-control-custom" id="login-username" autocomplete="username" required placeholder="Enter administrative username">
        </div>
        <div>
          <label class="form-label text-white-50 small mb-1.5 fw-medium">Security Password</label>
          <input type="password" class="form-control form-control-custom" id="login-password" autocomplete="current-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-custom-primary mt-3" id="login-submit-btn">
          Verify Security Clearance <i class="bi bi-shield-shaded ms-2"></i>
        </button>
      </form>
    </div>
  </div>

  <div class="text-center mt-4 small text-muted">
    <p class="mb-1">&copy; 2026 EJaytech Concepts. All Rights Reserved.</p>
    <a href="portal.html" class="text-decoration-none text-white-50 hover-link d-inline-block mt-1"><i class="bi bi-arrow-left me-1"></i> Return to Portal</a>
  </div>

  <!-- App Custom Logic Modules -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    // Handle login authentication
    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usernameInput = document.getElementById('login-username').value.trim();
      const passwordInput = document.getElementById('login-password').value;
      const submitBtn = document.getElementById('login-submit-btn');

      const errAlert = document.getElementById('login-error-alert');
      const errText = document.getElementById('login-err-msg');
      const succAlert = document.getElementById('login-success-alert');
      const succText = document.getElementById('login-success-msg');

      errAlert.classList.add('d-none');
      succAlert.classList.add('d-none');

      try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Validating security credentials...';

        // Log in utilizing the loginUserAccount system globally exposed
        const result = await window.loginUserAccount(usernameInput, passwordInput);

        if (result && result.role === 'admin') {
          succAlert.classList.remove('d-none');
          succText.textContent = "Security clearance confirmed. Granting administrative workspace access...";
          
          setTimeout(() => {
            window.location.href = "admin-dashboard.html";
          }, 1200);
        } else {
          await window.auth.signOut();
          throw new Error("Access Denied! Standard accounts are not permitted to access this sector.");
        }
      } catch (err) {
        console.error(err);
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Verify Security Clearance <i class="bi bi-shield-shaded ms-2"></i>';
        errAlert.classList.remove('d-none');
        errText.textContent = err.message || "Invalid administrative credentials. Access attempt rejected.";
      }
    });
  </script>
</body>
</html>
